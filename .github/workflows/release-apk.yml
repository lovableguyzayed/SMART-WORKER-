name: Release APKs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Package APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/SmartWorker-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/SmartWorker-release.apk
          cd out && zip -9 SmartWorker-APKs.zip SmartWorker-debug.apk SmartWorker-release.apk

      - name: Create GitHub release with APKs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-build-${{ github.run_number }}"
          gh release create "$TAG" \
            out/SmartWorker-APKs.zip \
            out/SmartWorker-debug.apk \
            out/SmartWorker-release.apk \
            --title "Smart Worker APKs — build ${{ github.run_number }}" \
            --notes "Debug + release APKs built from commit ${{ github.sha }} (branch ${{ github.ref_name }}). Install SmartWorker-debug.apk on any Android 8+ device. Login: admin / admin123." \
            --prerelease \
            --target ${{ github.sha }}
